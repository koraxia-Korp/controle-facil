# Publica o app no GitHub Pages a cada push, atualizando o branch gh-pages.
# O Pages está configurado para servir a raiz do branch gh-pages.
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - claude/app-deployment-excel-data-39v21e
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Montar site e publicar no branch gh-pages
        run: |
          mkdir -p /tmp/site
          cp index.html design-system.html manifest.json sw.js icon.svg /tmp/site/
          touch /tmp/site/.nojekyll
          cd /tmp/site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

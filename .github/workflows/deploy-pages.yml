# Publica o app no GitHub Pages a cada push.
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - claude/app-deployment-excel-data-39v21e
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar site (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
